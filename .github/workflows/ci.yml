name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API server (background)
        run: |
          Start-Process -NoNewWindow -FilePath python -ArgumentList "-m uvicorn app.main:app --host 127.0.0.1 --port 8000"
          Start-Sleep -Seconds 2

      - name: Wait for health
        run: |
          $max = 20
          for ($i=0; $i -lt $max; $i++) {
            try {
              $r = Invoke-WebRequest -UseBasicParsing http://127.0.0.1:8000/health -TimeoutSec 2
              if ($r.StatusCode -eq 200) { Write-Host "Health OK"; exit 0 }
            } catch {}
            Start-Sleep -Seconds 1
          }
          Write-Error "API did not become healthy in time"
          exit 1

      - name: Run tests + HTML report
        run: |
          python -m pytest -v --html=report.html --self-contained-html

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: report.html